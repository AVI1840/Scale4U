# ============================================================
# דוגמה מלאה להמחשה והדגמה בלבד - כל הנתונים סינתטיים (DEMO)
# יוזמה שמנותבת אוטומטית ל-ENTERPRISE: נוגעת בזכאות ובדאטה אישי.
# מטרת הדוגמה: להראות בדמו את ההבדל מול self-service על אותו מסך.
# ============================================================

meta:
  id: example-eligibility-assistant
  title: "עוזר AI להבהרת זכאות לגמלה מול אזרח"
  owner: "[שם] - מוביל שירות (דוגמה)"
  division: "מינהל גמלאות (דוגמה)"
  created: "2026-06-08"
  status: validated
  sprint_day: 5

problem:
  statement: "אזרחים מתקשים להבין לאילו גמלאות הם זכאים, ומציפים את מוקד השירות בשאלות חוזרות."
  affected_users: "אזרחים פונים + נציגי מוקד (היקף: TBV - אגף שירות)"
  current_process: "פנייה למוקד > נציג בודק במספר מסכים > מענה ידני, לעיתים לא אחיד"
  cost_of_status_quo: "TBV - עומס מוקד ושונות במענה. לאימות מול נתוני מוקד."
  trigger: "יעד ארגוני להפחתת עומס מוקד ושיפור אחידות"

baseline:
  estimated_time_without_scale4u_days: "~60 (יוזמה רגישה: דורשת ועדות, ייעוץ משפטי, אבטחת מידע)"
  confidence_in_estimate: "medium"
  similar_past_case: "פרויקט שירות דיגיטלי קודם שנתקע חודשים באישורי רגולציה (דוגמה)"

value:
  hypothesis: "אם עוזר ינתב נכון לפי מצב, פניות חוזרות יקטנו ואחידות המענה תעלה"
  metrics:
    - name: "אחוז פניות שנפתרות בערוץ עצמי"
      baseline: "TBV"
      target: "30%+"
      source: "נתוני מוקד (מתוכנן)"
  beneficiaries: ["אזרח - מענה מהיר", "עסקי - עומס מוקד", "מחשוב - דרך תהליך מבוקר"]

alternatives:
  - option: "לא לעשות כלום"
    assessment: "העומס גדל והשונות במענה נמשכת"
  - option: "פתרון לא-טכנולוגי (שיפור דפי מידע + תסריטי מוקד)"
    assessment: "מקל חלקית אך לא נותן מענה אישי לפי מצב"
  - option: "עוזר AI מותאם-מצב (הפתרון המוצע)"
    assessment: "מענה אישי, אך נוגע בזכאות ובדאטה אישי - מחייב מסלול enterprise"

risks:
  data_sensitivity: personal      # 3 נק'
  core_integration: read-only     # 1 נק'
  decision_impact: supportive     # 1 נק' (גם 'תומכת' מפעילה טריגר enterprise)
  user_scale: public              # 3 נק'
  regulatory: "חשיפת מידע לאזרח כפופה לחוק ולחוזרי זכאות; חובת דיוק"
  organizational: "דורש שותפות תמ\"מ, ייעוץ משפטי ואבטחת מידע מתחילת הדרך"

red_team:
  weakest_assumption: "שעוזר ינתב נכון בלי ליצור הבטחת זכאות מחייבת - סיכון משפטי מרכזי"
  failure_modes:
    - "האזרח מבין את התשובה כהתחייבות לזכאות"
    - "דיוק חלקי על מקרי קצה פוגע באמון"
    - "אינטגרציה למקורות הזכאות מורכבת ואיטית"
  hidden_costs: "ייעוץ משפטי, אבטחת מידע, תחזוקת לוגיקת זכאות מול שינויי חקיקה"
  implementation_complexity: "גבוהה - זכאות, דאטה אישי, חשיפה פומבית. מסלול enterprise מובהק."
  verdict: proceed-with-conditions  # תנאי: ניסוח משפטי + מסגרת אבטחת מידע לפני פיתוח

validation:
  asset_type: clickable-demo
  asset_path: "assets/example-eligibility-assistant/"
  test_plan: "6 משתמשים (אזרחים מדגמיים) + 2 נציגי מוקד; שאלה: האם המענה מובן וללא תחושת התחייבות; קריטריון: 6/8 מבינים נכון את מעמד התשובה"
  findings:
    - "5 מתוך 8 הבינו את התשובה כמידע ולא כהתחייבות; 3 נדרשו לניסוח ברור יותר"
    - "נציגי מוקד: יחסוך זמן אם הניסוח המשפטי ייסגר מראש"
  verdict: partially  # הכיוון נכון, אך הניסוח המשפטי חייב להיסגר לפני פרודקשן

gates:
  g0: { decision: "explore", by: "[מוביל Scale4U - דוגמה]", date: "2026-06-08", note: "כאב מובהק, יעד ארגוני" }
  g1: { decision: "proceed", by: "[מנהל אגף שירות - דוגמה]", date: "2026-06-09", note: "ברור שמסלול enterprise" }
  g2: { decision: "go", by: "[נציג עסקי בכיר + נציג תמ\"מ - דוגמה]", date: "2026-06-13", note: "Go מותנה לתהליך enterprise; ולידציה חלקית - הניסוח המשפטי תנאי כניסה לפיתוח" }

classification:
  route: "enterprise"
  rationale: "דאטה אישי (3), חשיפה פומבית (3), השפעה תומכת על זכאות - כל אחד מספיק לטריגר enterprise. בספק תמיד enterprise."

roi:
  scale4u_decision_days: "5"
  time_saved_days: "~55 (החלטה מנותבת ומאומתת ב-5 ימים מול ~60 בדרך הרגילה)"
  decision_outcome: "go"
  value_of_early_kill: "לא רלוונטי - אך נחסך סיכון של כניסה לפיתוח רגיש בלי ניסוח משפטי סגור"

sources:
  - { claim: "כל הנתונים בקובץ זה", source: "דוגמה סינתטית להדגמה בלבד", date: "2026-06-08" }
