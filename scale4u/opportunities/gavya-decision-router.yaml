meta:
  id: gavya-decision-router
  title: "מנתב תהליכי גבייה - כלי ניתוב פעולות לפקידי ביטוח וגבייה"
  owner: "TBV - מנהל אגף גבייה וביטוח"
  division: "מינהל ביטוח וגבייה"
  created: "2026-06-14"
  status: draft
  sprint_day: 0

problem:
  statement: "פקיד גבייה שמקבל החלטת שינוי מעמד צריך לזכור 10+ צמתי החלטה, 8 מסכים שונים, 3 נימוקים עם תוצאות שונות, וכללי חסימה - בזמן שהחוזר הרלוונטי הוא 8 עמודים צפופים"
  affected_users: "פקידי ביטוח וגבייה ב-5 מחוזות (חיפה, ת\"א, באר שבע, נצרת, ירושלים). TBV - כמה פקידים סך הכל"
  current_process: |
    1. פקיד מקבל בקשה לבדיקת יחסי עובד-מעביד (בעקבות תביעה לגמלה או חקירה משטרתית)
    2. פקיד בוחן את המקרה לפי חוזר 1207 (קרובי משפחה) או חוזרים אחרים
    3. פקיד מחליט: מוכר / לא מוכר
    4. אם לא מוכר - צריך לבחור נימוק (1/2/3), לבדוק אם בעל שליטה, לבדוק רציפות תקופות
    5. פקיד נכנס למסך 614 במערכת עסק, בוחר הודעת קבמע, ממלא שדות
    6. מנת לילה מפעילה 10 פעולות אוטומטיות (ביטול דוחות, חסימות, הודעות)
    7. פקיד מטפל ידנית בסגירת תיק / פתיחת תיק עצמאי / עדכון עיסוקים
    8. במקרה של טעות - 4 שלבי תיקון ידניים (163, 126, 102, מסך לבן)
  cost_of_status_quo: |
    - שגיאות בבחירת נימוק = תיקון ידני מורכב (4 שלבים)
    - בחירת נימוק 3 על בעל שליטה = שגיאה שהחוזר אוסר במפורש
    - שליחת בקשות מיותרות לרציפות ביטוח כשהמערכת עושה אוטומטית
    - הכשרת פקיד חדש לתהליך מלא: TBV - שבועות/חודשים
    - TBV - כמה טעויות בפועל בשנה
  trigger: "מנהל הגבייה ביקש הצעות ייעול וישום טוב יותר של החומרים המקצועיים (65 מסמכים)"

baseline:
  estimated_time_without_scale4u_days: "30"
  confidence_in_estimate: medium
  similar_past_case: "TBV - האם היוזמה הוגשה בעבר לפיתוח?"

value:
  hypothesis: "אם ניתן לפקיד כלי שמנתב אותו לפעולה הנכונה, אז טעויות בשינוי מעמד יפחתו משמעותית והכשרת עובדים חדשים תתקצר מחודשים לימים"
  metrics:
    - name: "זמן ממוצע לביצוע שינוי מעמד תקין"
      baseline: "TBV - לבדוק עם פקידים ותיקים"
      target: "5 דקות עם הכלי (לפקיד חדש)"
      source: "ימדד בפיילוט"
    - name: "אחוז שגיאות בבחירת נימוק/מסך"
      baseline: "TBV - לבדוק עם מנהלי צוותים"
      target: "0% (הכלי חוסם פעולות אסורות)"
      source: "ימדד בפיילוט"
    - name: "זמן הכשרה של פקיד חדש לתהליך שינוי מעמד"
      baseline: "TBV"
      target: "יום אחד עם הכלי"
      source: "TBV - לשאול HR/הדרכה"
  beneficiaries:
    - עסקי   # מנהלי צוותים - פחות פניות על טעויות
    - עובד   # פקידים - ביטחון בביצוע

alternatives:
  - option: "לא לעשות כלום"
    assessment: "הידע נשאר בראשם של ותיקים. פקידים חדשים טועים. ביקורת חושפת חוסר עקביות. עלות תיקון טעויות נמשכת."
  - option: "פתרון לא-טכנולוגי - הדרכה + דפי עזר מודפסים"
    assessment: "יש כבר חוברת הדרכה 2018 ושאלות ותשובות. לא פתר את הבעיה כי: דפוס לא אינטראקטיבי, לא חוסם טעויות, לא מתעדכן בקלות, לא מונע בחירת נימוק שגוי."
  - option: "מנתב תהליכי גבייה - כלי CLI אינטראקטיבי"
    assessment: "Python CLI שמנתב את הפקיד שלב-שלב: שואל 5-6 שאלות, חוסם פעולות אסורות, ומפלט הנחיה מדויקת (מסך + פעולה + קוד). לוגיקה מקודדת ב-YAML, ניתנת לתיקוף ועדכון ע\"י הנציגה. ישים ב-3 סשנים. לא דורש AI, אישורי מחשוב, או חיבור למערכות."

risks:
  data_sensitivity: none     # הכלי לא מכיל מידע אישי כלל. רק לוגיקה תהליכית.
  core_integration: none     # standalone, אין כתיבה/קריאה ממערכות
  decision_impact: supportive # מציג הנחיות, פקיד מבצע בעצמו
  user_scale: division       # אגף גבייה וביטוח, 5 מחוזות
  citizen_rights_impact: none # הכלי לא נוגע באזרח, רק מסייע לפקיד
  regulatory: "חוזרי ביטוח 1207, 1299, 1371, 1406. הכלי מקודד את הנהלים - לא מחליף אותם."
  organizational: "TBV - האם מחשוב יתנגד? הכלי standalone ולא מתחבר למערכות שלהם. האם האגף יאמץ כלי CLI?"

red_team:
  weakest_assumption: "שפקידים ירצו להשתמש בכלי CLI במקום לשאול עמית ותיק"
  failure_modes:
    - "פקידים ותיקים לא ישתמשו כי 'אני כבר יודע' - הכלי יישאר רק לחדשים"
    - "הלוגיקה ב-YAML תיהפך ל-stale כשחוזרים מתעדכנים ואף אחד לא יעדכן את הכלי"
    - "Python לא מותקן על תחנות פקידים (ענן ממשלתי) ואין אישור להתקנה"
    - "החוזרים מכילים יותר edge cases ממה שקידדנו - הכלי ייתן תשובה חלקית"
  hidden_costs: "תחזוקת YAML בכל עדכון חוזר. בדיקה מחדש שהלוגיקה עדיין נכונה. מי אחראי?"
  implementation_complexity: "נמוכה - Python + YAML + Rich, ללא אינטגרציות"
  verdict: proceed-with-conditions  # תנאי: וידוא שPython מותקן, מינוי אחראי עדכון, פיילוט עם 3-5 פקידים

