problem:
  statement: "פקיד שצריך להפיק הודעות קביעת מעמד לא יודע כמה הודעות נפרדות להפיק כשתקופות העבודה אינן רציפות - וטעות בזה דורשת תיקון ידני"
  affected_users: "פקידי ביטוח וגבייה בכל 5 המחוזות"
  current_process: |
    1. פקיד מקבל החלטת ביטול עם טווח תקופות
    2. בודק ידנית אם התקופות רציפות
    3. בודק למה הרצף נקטע (הכרה vs. אי-דיווח)
    4. מחשב כמה הודעות - אחת או נפרדות
    5. חשוב: ביטול מקור 126 מוחק כל שנת המס - צריך לדעת שאם יש הכרה אחרי הביטול צריך לעדכן 134
  cost_of_status_quo: "TBV - שגיאות בהפקת הודעות, פניות למשרד ראשי, עיכובים"
  trigger: "חלק מסריקת ייעול חומרי אגף הגבייה"

